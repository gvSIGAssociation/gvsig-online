{% extends "base_symbology.html" %}
{% load static %}
{% load i18n %}

{% block content %}
<div class="row">
	<div class="col-md-12">
		<div class="pl-panel">
		<form id="color_ramp_form" role="form" method="post" action="/gvsigonline/symbology/color_ramp_add/{{folder.id}}/">
			<div class="pl-panel__header">
				<h3 class="pl-panel__title"><i class="fa fa-tint"></i>{% trans "Add new color ramp" %}</h3>
				<div class="pl-panel__actions">
					<div id="save-legend" class="btn-pf-save save-legend"><i class="fa fa-floppy-o"></i> {% trans "Save" %}</div>
				</div>
			</div>

			<div class="pl-panel__body with-padding">
				{% csrf_token %}
				<div class="row">
					<div class="col-md-6">
						<div id="form-error" class="pf-error-msg">{{message}}</div>
						<div class="row">
							<div class="col-md-12 form-group">
								<label>{% trans "Name" %}</label>
								<input placeholder="{% trans 'Style name' %}" name="colorramp-name" id="colorramp-name" value="" type="text" class="form-control">
								<input name="colorramp-definition" id="colorramp-definition" value="" type="hidden">
							</div>
						</div>
					</div>
					<div class="col-md-6">
						<div id="map" class="preview-ramp-color"></div>
					</div>						
				</div>
				
				<div id="steps" class="row">
					<div class="col-md-12">
						<div id="form-error-steps" class="pf-error-msg"></div>
						<div class="row">
							<div class="col-md-12 form-group">
								<label>{% trans "Steps" %}</label>
								<div id="add-step" class="btn-pf-secondary add-legend pull-right"><i class="fa fa-plus"></i> {% trans "Add step" %}</div>					
							</div>
						</div>
					</div>
					<div id="steps-body" class="col-md-12">
					</div>
				</div>
				
			</div>
			</form>
		</div>
	</div>
</div>

<!-- Modal -->
<div class="modal fade" id="modal-color-map-entry" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
				<h4 class="modal-title">{% trans "Edit color ramp entry" %}</h4>
			</div>
			<div class="modal-body">
				<div class="nav-tabs-custom">
	            	<ul id="tab-menu" class="nav nav-tabs">				                        
	            	</ul>
	            	<div id="tab-content" class="tab-content">
	            	</div>
       			</div>
			</div>
		</div>
	</div>
</div> 
{% endblock %}

{% block extra-scripts %}
<script>
	$('#menu-manage-symbology').addClass("active");
	$('#submenu-colorramp').addClass("active");
</script>
<script>
$(document).ready(function() {
	var self = this;
	this.color_ramp = new ColorRamp("", null);
	
	$("#steps-body").append(this.color_ramp.getColorRampTableUI());
	this.color_ramp.addDefaultEntries();
	
	
	$("#add-step").on('click', function(e){
		self.color_ramp.addColorRamp(100, "#000000", 1);
		self.color_ramp.refreshPreview();
	});


	$("#save-legend").on('click', function(e){
		$("#form-error").empty();
		$("#form-error-steps").empty();
		var nameVal = ($("#colorramp-name").val() || '').trim();
		if (nameVal === '') {
			$("#form-error").append('<p>*{% trans "Field name is required" %}</p>');
			return;
		}
		var color_tabs = $("#colorramp-table").find("tr");
		if(color_tabs.length<3){
			$("#form-error-steps").append('<p>*{% trans "Two or more color definitions are required" %}</p>');
			return;
		}
		var ramp_color_array = [];

		$(".color-ramp-data").each(function(){
			var quantity = $(this).find(".percentaje-chooser").val();
			var color = $(this).find(".color-chooser").val();
			var alpha = $(this).find(".alpha-chooser").val();
			var aux_color_entry = {
					'quantity': quantity,
					'color': color,
					'alpha': alpha
			}
			ramp_color_array.push(aux_color_entry);

		});
		var array_size = ramp_color_array.length;
		item =  ramp_color_array[array_size-1]
		var last_quantity = parseInt(item.quantity);
		if  (last_quantity < 100) {
			var aux_color_entry = {
					'quantity': '100',
					'color': item.color,
					'alpha': item.alpha
			}
			ramp_color_array.push(aux_color_entry);
		}
		var ramp_color = {
				'definition' : ramp_color_array
		};

		$("#colorramp-definition").val(JSON.stringify(ramp_color));

		$("#color_ramp_form").submit();
	});
	
});
</script>
{% endblock %}
