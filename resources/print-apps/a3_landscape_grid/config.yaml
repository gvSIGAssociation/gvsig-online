templates:
  #===========================================================================
  A3 landscape grid: !template
  #===========================================================================
    reportTemplate: a3_landscape_grid.jrxml
    attributes:
      title: !string
        default: "Default Title"
      crs: !string
        default: "EPSG:3857"
      crsPermanent: !string
        default: "EPSG:3857"
      legalWarning: !string
        default: "Legal Warning"
        
      overlayLayers: !staticLayers
        default:
          layers: [
            {
              "type": "grid",
              "gridType": "points",
              "numberOfLines": [2, 2],
              "renderAsSvg": true,
              "gridColor": "lightgray",
              "haloColor": "#CCFFCC",
              "labelColor": "darkgray",
              "labelFormat": "%1.0f %s",
              "indent": 8,
              "haloRadius": 0,
              "rotateLabels": false,
              "font": {
                "name": [
                  "Liberation Sans",
                  "Helvetica",
                  "Nimbus Sans L",
                  "FreeSans",
                  "Sans-serif"
                ],
                "size": 8,
                "style": "PLAIN"
              }
            }
        ]




      map: !map
        maxDpi: 400
        width: 1150
        height: 730
        default:
          useAdjustBounds: true
      scalebar: !scalebar
        width: 250
        height: 30
        default:
          backgroundColor: "rgba(255, 255, 255, 0)"
          align: "center"
          fontSize: 8
          barSize: 6
          geodetic: false
          barsize: 250
          linewidth: 1
          subIntervals: true
      northArrowDef: !northArrow
        size: 60
        default:
          graphic: "file://NorthArrow_10.svg"
          backgroundColor: "rgba(255, 255, 255, 0)"
      legend: !legend {}
      logo_url: !string
        default: "logo.png"
      scale: !string
        default: ""
    processors:
    # - !configureHttpRequests
    #   httpProcessors:
    #     - !restrictUris
    #       matchers:
    #         - !localMatch {}
    #         - !acceptAll {}
    #     - !forwardHeaders
    #       headers: [Referer, User-Agent]
    #     # Add a static header to all http requests
    #     - !addHeaders
    #       headers:
    #         newHeader : 'headerValue'
    - !addOverlayLayers
      inputMapper:
          overlayLayers: staticLayers
          map: map
    - !reportBuilder # compile all reports in current directory
      directory: '.'
    - !createMap
      inputMapper: {map: map}
      outputMapper: {mapSubReport: mapSubReport}
    - !createScalebar {}
    - !createNorthArrow
        inputMapper: {map: map, northArrowDef: northArrow}
    - !prepareLegend # create a datasource for the report with the 'legend' attribute
      maxWidth: 16
      dpi: 100
      scaled: true      
      template: legend.jrxml
      inputMapper: {legend: legend}
      outputMapper:
        legendDataSource: legendDataSource
        legendSubReport: legendSubReport
        numberOfLegendRows: numberOfLegendRows
